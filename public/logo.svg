<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <rect width="100" height="100" rx="22" fill="white"/>
  <!-- Rupee symbol body -->
  <defs>
    <linearGradient id="rupeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a56e8"/>
      <stop offset="100%" stop-color="#0a2d8f"/>
    </linearGradient>
    <linearGradient id="checkGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
  </defs>
  <!-- Top horizontal bars of ₹ -->
  <rect x="22" y="18" width="56" height="8" rx="4" fill="url(#rupeGrad)"/>
  <rect x="22" y="32" width="56" height="8" rx="4" fill="url(#rupeGrad)"/>
  <!-- Vertical stem of ₹ -->
  <path d="M30 40 L55 80" stroke="url(#rupeGrad)" stroke-width="11" stroke-linecap="round"/>
  <!-- Lower left arm of ₹ -->
  <path d="M30 40 Q42 58 60 62" stroke="url(#rupeGrad)" stroke-width="9" stroke-linecap="round" fill="none"/>
  <!-- Green checkmark overlay -->
  <path d="M47 68 L58 80 L80 52" stroke="url(#checkGrad)" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
